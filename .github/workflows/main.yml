name: Strix Security Scan

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]
  workflow_dispatch:  # 手动触发

jobs:
  strix-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Strix 需要历史记录以支持 diff 模式

      - name: Install Strix
        run: curl -sSL https://strix.ai/install | bash

      - name: Run Strix Scan
        env:
          # === 必须配置的密钥（在仓库 Settings → Secrets and variables → Actions 中添加）===
          STRIX_LLM: deepseek/deepseek-v4-flash
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          strix -n \
            --target https://github.com/lcg0124/bootdo \
            --scan-mode deep
